name: aws-pipeline
on: workflow_dispatch
jobs:
  build-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: installing python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: install dependency
        run: pip3 install -r requirements.txt

      - name: run application
        run: python3 app.py &